  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

x: -1;\n    border-radius: 2px;\n  }\n\n  .hero-sub {\n    max-width: 620px;\n    margin-top: 32px;\n    font-size: clamp(17px, 1.4vw, 20px);\n    line-height: 1.5;\n    color: var(--gray-700);\n    font-weight: 400;\n  }\n  .hero-sub strong { color: var(--charcoal); font-weight: 600; }\n\n  .hero-cta { margin-top: 40px; display: flex; gap: 12px; flex-wrap: wrap; }\n\n  .hero-footprint {\n    margin-top: 72px;\n    padding-top: 28px;\n    border-top: 1px solid color-mix(in srgb, var(--charcoal) 10%, transparent);\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 32px;\n  }\n  .footprint-label {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--gray-500);\n    margin-bottom: 10px;\n  }\n  .footprint-value {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: clamp(32px, 3.6vw, 52px);\n    line-height: 1;\n    color: var(--charcoal);\n    letter-spacing: -0.02em;\n  }\n  .footprint-value .suffix { color: var(--purple); }\n  .footprint-desc { margin-top: 8px; font-size: 13px; color: var(--gray-500); }\n\n  /* ---------- Section shell ---------- */\n  section { position: relative; padding: 120px 0; }\n  .section-head { display: grid; grid-template-columns: 160px 1fr; gap: 48px; align-items: start; margin-bottom: 72px; }\n  .section-index {\n    font-family: var(--mono);\n    font-size: 12px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--purple);\n    padding-top: 8px;\n  }\n  .section-title {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: clamp(40px, 5.6vw, 84px);\n    line-height: 0.9;\n    letter-spacing: -0.015em;\n    color: var(--charcoal);\n    max-width: 18ch;\n  }\n  .section-intro {\n    margin-top: 24px;\n    font-size: 18px;\n    color: var(--gray-700);\n    max-width: 58ch;\n  }\n\n  /* ---------- Suite pillars ---------- */\n  .pillars {\n    display: grid;\n    grid-template .9;\n    letter-spacing: -0.015em;\n    color: #fff;\n    max-width: 18ch;\n    margin-bottom: 24px;\n  }\n  .engine-title span { color: var(--lilac); }\n  .engine-sub {\n    font-size: 18px;\n    color: rgba(255,255,255,0.72);\n    max-width: 60ch;\n    margin-bottom: 72px;\n  }\n  .engine-grid {\n    display: grid;\n    grid-template-columns: 1.2fr 1fr;\n    gap: 64px;\n    align-items: center;\n  }\n  .engine-stats {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 1px;\n    background: rgba(255,255,255,0.1);\n    border: 1px solid rgba(255,255,255,0.1);\n    border-radius: var(--radius-lg);\n    overflow: hidden;\n  }\n  .engine-stat {\n    padding: 36px 32px;\n    background: rgba(255,255,255,0.02);\n    backdrop-filter: blur(6px);\n  }\n  .engine-stat-value {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: clamp(44px, 4.5vw, 64px);\n    line-height: 1;\n    letter-spacing: -0.02em;\n    color: #fff;\n  }\n  .engine-stat-value .unit { color: var(--lilac); }\n  .engine-stat-label {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.5);\n    margin-bottom: 14px;\n  }\n  .engine-stat-desc {\n    font-size: 13px;\n    color: rgba(255,255,255,0.6);\n    margin-top: 10px;\n    line-height: 1.5;\n  }\n  .engine-points { display: flex; flex-direction: column; gap: 28px; }\n  .engine-point {\n    display: grid;\n    grid-template-columns: 32px 1fr;\n    gap: 20px;\n    align-items: start;\n  }\n  .engine-point-num {\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--lilac);\n    padding-top: 4px;\n    letter-spacing: 0.08em;\n  }\n  .engine-point-title {\n    font-family: var(--display);\n    font-size: 22px;\n    font-weight: 700;\n    margin-bottom: 6px;\n    color: #fff;\n    letter-spacing: -0.005em;\n  }\n  .engine-point-desc {\n    font-size: 14.5px;\n    color: rgba(255,255,255,0.65);\n    line-height: 1.55;\n  }\n\n  /* ---------- C-suite ---------- */\n  .csuite {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 1px;\n    background: color-mix(in srgb, var(--charcoal) 10%, transparent);\n    border: 1px solid color-mix(in srgb, var(--charcoal) 10%, transparent);\n    border-radius: var(--radius-lg);\n    overflow: hidden;\n  }\n  .csuite-card {\n    background: var(--paper);\n    padding: 44px 32px;\n    min-height: 320px;\n    display: flex;\n    flex-direction: column;\n    transition: background .3s var(--ease);\n  }\n  .csuite-card:hover { background: var(--blush-soft); }\n  .csuite-role {\n    font-family: var(--display);\n    font-size: 72px;\n    line-height: 1;\n    font-weight: 800;\n    color: var(--purple);\n    letter-spacing: -0.03em;\n    margin-bottom: 28px;\n  }\n  .csuite-headline {\n    font-family: var(--display);\n    font-size: 22px;\n    font-weight: 700;\n    letter-spacing: -0.005em;\n    line-height: 1.15;\n    margin-bottom: 14px;\n    color: var(--charcoal);\n  }\n  .csuite-body {\n    font-size: 14px;\n    color: var(--gray-700);\n    line-height: 1.55;\n    flex: 1;\n  }\n  .csuite-metric {\n    margin-top: 22px;\n    padding-top: 20px;\n    border-top: 1px solid var(--gray-100);\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--gray-500);\n  }\n  .csuite-metric strong {\n    color: var(--purple);\n    font-weight: 600;\n  }\n\n  /* ---------- Deploy ---------- */\n  .deploy-wrap {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 80px;\n    align-items: start;\n  }\n  .deploy-list { display: flex; flex-direction: column; gap: 4px; }\n  .deploy-row {\n    display: grid;\n    grid-template-columns: 48px 1fr auto;\n    gap: 24px;\n    align-items: center;\n    padding: 24px 0;\n    border-bottom: 1px solid var(--gray-100);\n    transition: padding-left .3s var(--ease);\n  }\n  .deploy-row:hover { padding-left: 8px; }\n rain.<\u002Fh2>\n        <p class=\"section-intro\">Every enterprise workflow that involves Arabic text, documents, or voice — now sitting behind a single console. Ready to use. Ready to ship.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pillars reveal\">\n      <!-- Assistants -->\n      <div class=\"pillar\">\n        <div class=\"pillar-num\">01<\u002Fdiv>\n        <div class=\"pillar-icon\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <rect x=\"3\" y=\"3\" width=\"8\" height=\"8\" rx=\"2\"><\u002Frect>\n            <rect x=\"13\" y=\"3\" width=\"8\" height=\"8\" rx=\"2\"><\u002Frect>\n            <rect x=\"3\" y=\"13\" width=\"8\" height=\"8\" rx=\"2\"><\u002Frect>\n            <rect x=\"13\" y=\"13\" width=\"8\" height=\"8\" rx=\"2\"><\u002Frect>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"pillar-title\">Assistants<\u002Fh3>\n        <p class=\"pillar-desc\">A library of purpose-built Arabic AI agents for legal, procurement, operations, and knowledge work. Drafts documents, reviews contracts, answers questions grounded in your data.<\u002Fp>\n        <a href=\"#assistants\" class=\"pillar-link\">See all assistants\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Translate -->\n      <div class=\"pillar\">\n        <div class=\"pillar-num\">02<\u002Fdiv>\n        <div class=\"pillar-icon\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M4 5h7M8 3v2c0 4.5-2 7-5 9\"><\u002Fpath>\n            <path d=\"M5 9c1 2.5 5 6 8 7\"><\u002Fpath>\n            <path d=\"M13 21l4-10 4 10M14.5 17h5\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"pillar-title\">Translate<\u002Fh3>\n        <p class=\"pillar-desc\">Enterprise-grade Arabic translation across 100+ language pairs. Preserves formatting, terminology, tone, and domain. Drag a doc, get a board-ready translation in minutes.<\u002Fp>\n        <a href=\"translate.html\" class=\"pillar-link\">Go to Translate\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <!-- OCR -->\n      <div class=\"pillar\">\n        <div class=\"pillar-num\">03<\u002Fdiv>\n        <div class=\"pillar-icon\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M4 7V5a2 2 0 0 1 2-2h2M16 3h2a2 2 0 0 1 2 2v2M20 17v2a2 2 0 0 1-2 2h-2M8 21H6a2 2 0 0 1-2-2v-2\"><\u002Fpath>\n            <path d=\"M8 12h8M8 9h5M8 15h6\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"pillar-title\">OCR<\u002Fh3>\n        <p class=\"pillar-desc\">High-accuracy Arabic OCR for scanned contracts, tender dossiers, IDs, and handwriting. Turns image-locked documents into structured, searchable, AI-ready text.<\u002Fp>\n        <a href=\"ocr.html\" class=\"pillar-link\">Go to OCR\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Speech -->\n      <div class=\"pillar\">\n        <div class=\"pillar-num\">04<\u002Fdiv>\n        <div class=\"pillar-icon\">\n          <svg width=\"26\" height=\"26\ ne\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M12 19l7-7 3 3-7 7-3-3z\"><\u002Fpath>\n              <path d=\"M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z\"><\u002Fpath>\n              <path d=\"M2 2l7.586 7.586\"><\u002Fpath>\n              <circle cx=\"11\" cy=\"11\" r=\"2\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <span class=\"assistant-badge live\">Live<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Doc Drafting<\u002Fh3>\n        <div class=\"assistant-tag\">Senior-grade Word documents, drafted from a smart interview.<\u002Fdiv>\n        <p class=\"assistant-desc\">Tell it what you need. The assistant interviews you like a senior practitioner would, then writes a fully structured, properly styled .docx with the right tone, clauses, and signature blocks.<\u002Fp>\n        <div class=\"assistant-tags\">\n          <span>Legal<\u002Fspan><span>Drafting<\u002Fspan><span>Word output<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 2 -->\n      <a href=\"kuwait-tender.html\" class=\"assistant\" style=\"--accent: #B91C3B; text-decoration: none; color: inherit;\">\n        <div class=\"assistant-head\">\n          <div class=\"assistant-icon\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M4 21V4a2 2 0 0 1 2-2h10l-2 5 2 5H6\"><\u002Fpath>\n              <path d=\"M4 13v8\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <span class=\"assistant-badge live\">Live<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Kuwait Tender Builder<\u002Fh3>\n        <div class=\"assistant-tag\">RFP, RFI, and RFQ documents grounded in Kuwait Law 49/2016.<\u002Fdiv>\n        <p class=\"assistant-desc\">Pick the tender kind, describe what’s being procured, answer a few smart questions, and get a fully structured Word document in formal Arabic or English — every clause grounded via a dedicated RAG knowledge base.<\u002Fp>\n        <div class=\"assistant-tags\">\n          <span>Kuwait<\u002Fspan><span>Procurement<\u002Fspan><span>RAG-grounded<\u002Fspan><span>Word output<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 3 -->\n      <a href=\"contract-reviewer.html\" class=\"assistant\" style=\"--accent: #4F46E5; text-decoration: none; color: inherit;\">\n        <div class=\"assistant-head\">\n          <div class=\"assistant-icon\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath>\n              <path d=\"M14 2v6h6\"><\u002Fpath>\n              <path d=\"M9 15l2 2 4-4\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <span class=\"assistant-badge live\">Live<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Contract Reviewer<\u002Fh3>\n        <div class=\"assistant-tag\">Risk-rated contract analysis with redlines you can ship.<\u002Fdiv>\n        <p class=\"assistant-desc\">Upload any contract and get an instant, clause-level review: risk flags, obligations, key dates, missing clauses, and suggested edits — all scored and ranked.<\u002Fp>\n        <div class=\"assistant-tags\">\n          <span>Legal<\u002Fspan><span>Review<\u002Fspan><span>Arabic + English<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 4 -->\n      <a href=\"doc-summarizer.html\" class=\"assistant\" style=\"--accent: #0E9488; text-decoration: none; color: inherit;\">\n        <div class=\"assistant-head\">\n          <div class=\"assistant-icon\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <line x1=\"4\" y1=\"6\" x2=\"20\" y2=\"6\"><\u002Fline>\n              <line x1=\"4\" y1=\"10\" x2=\"20\" y2=\"10\"><\u002Fline>\n              <line x1=\"4\" y1=\"14\" x2=\"14\" y2=\"14\"><\u002Fline>\n              <line x1=\"4\" y1=\"18\" x2=\"10\" y2=\"18\"><\u002Fline>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <span class=\"assistant-badge live\">Live<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Document Summarizer<\u002Fh3>\n        <div class=\"assistant-tag\">Turn anything long into a structured executive brief.<\u002Fdiv>\n        <p class=\"assistant-desc\">Paste text or upload a document and get a TL;DR, key points, action items, and extracted entities. Choose length and output language.<\u002Fp>\n        <div class=\"assistant-tags\">\n          <span>Productivity<\u002Fspan><span>Arabic + English<\u002Fspan><span>Any document<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 5 -->\n      <article class=\"assistant\" style=\"--accent: #B91C3B;\">\n        <div class=\"assistant-head\">\n          <div class=\"assistant-icon\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <span class=\"assistant-badge live\">Live<\u002Fspan>\n        <\u002Fdiv>\n        <h3>UAE Legal Q&amp;A<\u002Fh3>\n        <div class=\"assistant-tag\">Ask any question about UAE law, in Arabic or English.<\u002Fdiv>\n        <p class=\"assistant-desc\">A specialized assistant trained on United Arab Emirates laws and regulations. Scoped to UAE jurisdiction only. Remembers the conversation so you can keep drilling on the same topic.<\u002Fp>\n        <div class=\"assistant-tags\">\n          <span>UAE Law<\u002Fspan><span>Chat<\u002Fspan> : 40px;\">\n  <div class=\"engine\">\n    <div class=\"engine-wrap engine-inner\">\n      <div class=\"section-index\">/ 03 — The engine<\u002Fdiv>\n      <h2 class=\"engine-title\">Not another ChatGPT wrapper. <span>An Arabic-first foundation model.<\u002Fspan><\u002Fh2>\n      <p class=\"engine-sub\">The Suite runs on Pronoia — our proprietary Arabic LLM, trained on 17+ years of vetted Arabic data and 2B+ proprietary Arabic words. It understands MSA, dialects, and code-switching the way humans actually write in the region.<\u002Fp>\n\n      <div class=\"engine-grid\">\n        <div class=\"engine-stats\">\n          <div class=\"engine-stat\">\n            <div class=\"engine-stat-label\">Stanford HELM<\u002Fdiv>\n            <div class=\"engine-stat-value\">#1<span class=\"unit\"><\u002Fspan><\u002Fdiv>\n            <div class=\"engine-stat-desc\">Arabic benchmark ranking vs. GPT, Gemini, and Claude.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"engine-stat\">\n            <div class=\"engine-stat-label\">Accuracy<\u002Fdiv>\n            <div class=\"engine-stat-value\">2–3<span class=\"unit\">×<\u002Fspan><\u002Fdiv>\n            <div class=\"engine-stat-desc\">Higher than foreign models on Arabic tasks.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"engine-stat\">\n            <div class=\"engine-stat-label\">Throughput<\u002Fdiv>\n            <div class=\"engine-stat-value\">3<span class=\"unit\">×<\u002Fspan><\u002Fdiv>\n            <div class=\"engine-stat-desc\">Faster than global LLMs on Arabic workloads.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"engine-stat\">\n            <div class=\"engine-stat-label\">Dialects<\u002Fdiv>\n            <div class=\"engine-stat-value\">22<\u002Fdiv>\n            <div class=\"engine-stat-desc\">Gulf, Levantine, Maghrebi, Egyptian, Iraqi &amp; more.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"engine-points\">\n          <div class=\"engine-point\">\n            <div class=\"engine-point-num\">01<\u002Fdiv>\n            <div>\n              <div class=\"engine-point-title\">Arabic-first, not Arabic-bolted-on.<\u002Fdiv>\n              <div class=\"engine-point-desc\">Every component — tokenizer, RAG, evaluation — is built for Arabic morphology, dialects, and mixed-language reality.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"engine-point\">\n            <div class=\"engine-point-num\">02<\u002Fdiv>\n            <div>\n              <div class=\"engine-point-title\">Grounded by default.<\u002Fdiv>\n              <div class=\"engine-point-desc\">RAG and RAFT pipelines keep answers tied to your policies, laws, and documents. Every citation is traceable.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"engine-point\">\n            <div class=\"engine-point-num\">03<\u002Fdiv>\n            <div>\n              <div class=\"engine-point-title\">No-code agent factory.<\u002Fdiv>\n              <div class=\"engine-point-desc\">The AGRiD platform lets your team compose new assistants in days — with tool-use, multi-agent orchestration, and full governance.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"engine-point\">\n            <div class=\"engine-point-num\">04<\u002Fdiv>\n            <div>\n              <div class=\"engine-point-title\">Sovereign by design.<\u002Fdiv>\n              <div class=\"engine-point-desc\">Nothing leaves your perimeter. Cloud, VPC, on-prem, or air-gapped — you pick where the model runs.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== DEPLOY ===================== -->\n<section id=\"deploy\" style=\"padding-top: 0;\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <div class=\"section-index\">/ 04 — Deployment<\u002Fdiv>\n
